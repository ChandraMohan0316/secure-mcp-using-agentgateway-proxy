{{- range $i, $server := .Values.mcpServers }}
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ $server.name }}-route
  namespace: {{ $.Values.gateway.namespace }}
  labels:
    app: {{ $server.name }}
    {{- include "secure-mcp.labels" $ | nindent 4 }}
spec:
  parentRefs:
  - group: gateway.networking.k8s.io
    kind: Gateway
    name: agentgateway-proxy
    namespace: {{ $.Values.gateway.namespace }}
  rules:
  - backendRefs:
    - group: agentgateway.dev
      kind: AgentgatewayBackend
      name: {{ $server.name }}-backend
    matches:
    - path:
        type: PathPrefix
        value: /{{ $server.name }}
    - path:
        type: PathPrefix
        value: /.well-known/oauth-protected-resource/{{ $server.name }}
    - path:
        type: PathPrefix
        value: /.well-known/oauth-authorization-server/{{ $server.name }}
    {{- if eq $i 0 }}
    - path:
        type: PathPrefix
        value: /realms/{{ $.Values.keycloak.realm.name }}/protocol/openid-connect/certs
    {{- end }}
{{- end }}
