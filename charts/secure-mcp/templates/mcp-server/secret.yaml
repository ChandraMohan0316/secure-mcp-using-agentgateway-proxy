{{- range .Values.mcpServers }}
{{- if .backendToken }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ .name }}-backend-token
  namespace: {{ $.Values.gateway.namespace }}
  labels:
    app: {{ .name }}
    {{- include "secure-mcp.labels" $ | nindent 4 }}
type: Opaque
stringData:
  Authorization: "Bearer {{ .backendToken }}"
{{- end }}
{{- if .envSecrets }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ .name }}-env-secrets
  namespace: {{ .namespace | default "default" }}
  labels:
    app: {{ .name }}
    {{- include "secure-mcp.labels" $ | nindent 4 }}
type: Opaque
stringData:
  {{- range $key, $value := .envSecrets }}
  {{ $key }}: {{ $value | quote }}
  {{- end }}
{{- end }}
{{- end }}
