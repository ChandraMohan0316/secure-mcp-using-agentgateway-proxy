# -- Subchart toggles (set to false if CRDs/controller already installed)
agentgateway-crds:
  enabled: true
agentgateway:
  enabled: true

# -- Keycloak OAuth 2.0 Identity Provider
keycloak:
  image:
    repository: quay.io/keycloak/keycloak
    tag: "26.1.3"
  adminPassword: admin
  replicas: 1
  namespace: keycloak
  # hostname: ""  # External LB hostname for OAuth browser flow (e.g. k8s-keycloak-xxx.elb.amazonaws.com)
  resources:
    requests:
      cpu: 500m
      memory: 512Mi
    limits:
      cpu: "1"
      memory: 1Gi
  realm:
    name: mcp
    users:
      - username: user1
        password: password
        email: user1@example.com
        group: engineers
      - username: user2
        password: password
        email: user2@example.com
        group: viewers

# -- Gateway
gateway:
  namespace: agentgateway-system
  port: 8080
  aws:
    loadBalancerScheme: internet-facing

# -- Global authorization defaults (applied to all servers unless overridden)
authorization:
  defaultRules:
    - expression: 'true'

# -- MCP Servers
